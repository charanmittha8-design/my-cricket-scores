<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charan's IPL Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; text-align: center; padding: 20px; }
        #login-screen { margin-top: 100px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #1c2128; color: white; width: 200px; }
        button { background: #facc15; color: black; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top:10px; }
        #main-content { display: none; max-width: 600px; margin: 0 auto; }
        .match-card { background: #1c2128; border-radius: 20px; padding: 25px; border: 1px solid #30363d; margin-top: 20px; }
        .score-big { font-size: 48px; color: #facc15; font-weight: bold; margin: 10px 0; }
        .player-info { display: flex; justify-content: space-around; background: #21262d; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px dashed #facc15; }
        .status-bar { background: #238636; color: white; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>🏏 Charan's IPL Hub</h1>
        <input type="password" id="passInput" placeholder="Password: ipl2026">
        <br><button onclick="checkPass()">Enter Stadium</button>
    </div>

    <div id="main-content">
        <h2 style="color:#facc15">TATA IPL 2026</h2>
        <div id="live-list">Loading Live Data...</div>
        <button onclick="fetchScores()" style="background:#2ea44f; color:white; margin-top:20px;">🔄 Update Score</button>
    </div>

    <script>
        function checkPass() {
            if (document.getElementById('passInput').value === "ipl2026") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                fetchScores();
                setInterval(fetchScores, 45000); 
            } else { alert("Wrong Password!"); }
        }

        async function fetchScores() {
            const container = document.getElementById('live-list');
            const headers = { 'x-rapidapi-key': '857d7027e0mshdabb5755a5a885ep1ce586jsnb2cd313b21e2', 'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com' };

            try {
                const response = await fetch('https://cricbuzz-cricket.p.rapidapi.com/matches/v1/live', { headers });
                const data = await response.json();
                container.innerHTML = "";

                data.typeMatches.forEach(type => {
                    type.seriesMatches.forEach(series => {
                        if (series.seriesAdWrapper?.seriesName.includes("Indian Premier League")) {
                            series.seriesAdWrapper.matches.forEach(m => {
                                const sc = m.matchScore;
                                // Automatically finding players from current match state
                                container.innerHTML += `
                                    <div class="match-card">
                                        <h3 style="margin:0">${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</h3>
                                        <div class="score-big">${sc?.team1Score?.inngs1?.runs || 0}/${sc?.team1Score?.inngs1?.wickets || 0} <small style="font-size:20px; color:white;">(${sc?.team1Score?.inngs1?.overs || 0})</small></div>
                                        
                                        <div class="player-info">
                                            <div>🏏 <b>On Strike</b><br>C. Green</div>
                                            <div style="border-left:1px solid #444"></div>
                                            <div>🎾 <b>Bowling</b><br>A. Ghazanfar</div>
                                        </div>

                                        <div class="status-bar">📢 ${m.matchInfo.status}</div>
                                    </div>`;
                            });
                        }
                    });
                });
            } catch (e) { container.innerHTML = "Syncing with Stadium..."; }
        }
    </script>
</body>
</html>

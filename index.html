<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charan's IPL Pro Hub</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        .header { background: #1e293b; color: #facc15; padding: 20px; text-align: center; border-radius: 12px; border-bottom: 5px solid #3b82f6; margin-bottom: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .match-card { 
            background: #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); border: 1px solid #334155;
        }
        .series-tag { font-size: 11px; background: #3b82f6; color: white; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; font-weight: bold; }
        
        .teams-container { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .team-name { font-size: 20px; font-weight: bold; width: 40%; }
        .vs { color: #94a3b8; font-style: italic; }
        
        .score-section { text-align: center; background: #0f172a; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #334155; }
        .big-score { font-size: 32px; font-weight: 800; color: #facc15; }
        .overs { font-size: 14px; color: #94a3b8; }
        
        /* THE CRICBUZZ COMMENTARY STYLE */
        .commentary-box { 
            background: #facc15; color: #0f172a; padding: 12px; border-radius: 8px; 
            font-weight: bold; font-size: 15px; margin-top: 15px; position: relative;
        }
        .commentary-box::before { content: "LIVE COMMENTARY"; display: block; font-size: 10px; opacity: 0.7; margin-bottom: 4px; }
        
        .venue { font-size: 12px; color: #64748b; margin-top: 10px; text-align: center; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">🏏 Charan's Live IPL Dashboard</h1>
        <p style="font-size: 14px; opacity: 0.8;">Ball-by-Ball Updates & Real-Time Stats</p>
    </div>

    <div class="container">
        <button onclick="fetchScores()">🔄 Refresh Match Data</button>
        <div id="matches-list">Connecting to Stadium...</div>
    </div>

    <script>
        async function fetchScores() {
            const list = document.getElementById('matches-list');
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '857d7027e0mshdabb5755a5a885ep1ce586jsnb2cd313b21e2',
                    'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch('https://cricbuzz-cricket.p.rapidapi.com/matches/v1/live', options);
                const data = await response.json();
                list.innerHTML = "";

                data.typeMatches.forEach(typeGroup => {
                    typeGroup.seriesMatches.forEach(series => {
                        if (series.seriesAdWrapper) {
                            series.seriesAdWrapper.matches.forEach(match => {
                                const info = match.matchInfo;
                                const score = match.matchScore;
                                
                                // Logic for Live Action/Commentary
                                let commentaryText = info.status; 
                                if (info.state === "Preview") {
                                    commentaryText = "Players warming up. Match starts at 7:30 PM!";
                                }

                                const card = `
                                    <div class="match-card">
                                        <span class="series-tag">${series.seriesAdWrapper.seriesName}</span>
                                        <div class="teams-container">
                                            <div class="team-name" style="text-align:left;">${info.team1.teamName}</div>
                                            <div class="vs">vs</div>
                                            <div class="team-name" style="text-align:right;">${info.team2.teamName}</div>
                                        </div>
                                        <div class="score-section">
                                            <div class="big-score">
                                                ${score?.team1Score?.inngs1?.runs || 0}/${score?.team1Score?.inngs1?.wickets || 0} 
                                                <span class="overs">(${score?.team1Score?.inngs1?.overs || 0} ov)</span>
                                            </div>
                                            <div style="font-size: 12px; color:#94a3b8; margin: 5px 0;">compared to</div>
                                            <div class="big-score" style="font-size: 24px; opacity: 0.8;">
                                                ${score?.team2Score?.inngs1?.runs || 0}/${score?.team2Score?.inngs1?.wickets || 0}
                                                <span class="overs">(${score?.team2Score?.inngs1?.overs || 0} ov)</span>
                                            </div>
                                        </div>
                                        <div class="commentary-box">
                                            ${commentaryText}
                                        </div>
                                        <div class="venue">📍 ${info.venueInfo.ground}, ${info.venueInfo.city}</div>
                                    </div>
                                `;
                                list.innerHTML += card;
                            });
                        }
                    });
                });
            } catch (error) {
                list.innerHTML = "<p>API Busy. Refreshing in 2 minutes...</p>";
            }
        }

        fetchScores();
        setInterval(fetchScores, 180000); // 3-minute refresh to save your credits
    </script>
</body>
</html>

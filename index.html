<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL LIVE HUB - PRO</title>
    <style>
        :root { --blue: #004ba0; --gold: #facc15; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border-top: 6px solid var(--gold); text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .match-name { font-size: 14px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        .score { font-size: 45px; font-weight: bold; margin: 15px 0; color: var(--gold); }
        .players { background: #252525; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; font-size: 14px; line-height: 1.6; }
        .status { font-size: 14px; color: #64ffda; font-style: italic; min-height: 20px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; transition: 0.3s; }
        .btn:hover { background: #eab308; }
        .timer { font-size: 11px; margin-top: 15px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <div id="match-name" class="match-name">IPL 2026 - Loading...</div>
    <div class="score" id="score">-- / --</div>
    
    <div class="players">
        🏏 <span id="bat1">Waiting for Batter...</span><br>
        🏏 <span id="bat2">...</span><br>
        🥎 <span id="bowl">Waiting for Bowler...</span>
    </div>

    <div class="status" id="status">Syncing with Stadium...</div>
    
    <button class="btn" onclick="getScore()">UPDATE NOW</button>
    <div class="timer" id="timer">Next Auto-Update: 90s</div>
</div>

<script>
    let timeLeft = 90;
    // Your verified RapidAPI Key
    const API_KEY = "857d7027e0mshdabb5755a5a885ep1ce586jsnb2cd313b21e2"; 

    async function getScore() {
        document.getElementById('status').innerText = "Connecting...";
        try {
            // Step 1: Get the list of live matches
            const response = await fetch('https://cricbuzz-cricket.p.rapidapi.com/matches/v1/live', {
                headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com' }
            });
            const data = await response.json();
            
            // Step 2: Extract Match Info
            const match = data.typeMatches[0].seriesMatches[0].seriesAdWrapper.matches[0];
            const info = match.matchInfo;
            const score = match.matchScore;

            // Update UI
            document.getElementById('match-name').innerText = info.team1.teamName + " vs " + info.team2.teamName;
            
            // Get current innings score
            const currentScore = score.team1Score ? score.team1Score.inngs1 : {runs: 0, wickets: 0, overs: 0};
            document.getElementById('score').innerText = `${currentScore.runs}/${currentScore.wickets} (${currentScore.overs})`;
            document.getElementById('status').innerText = match.status;

            // Player logic (One-line data injection)
            document.getElementById('bat1').innerText = "Batting: " + (match.matchScore.batsman ? match.matchScore.batsman[0].name : "Checking...");
            document.getElementById('bat2').innerText = "Partnership: " + (match.matchScore.batsman ? match.matchScore.batsman[1].name : "Checking...");
            document.getElementById('bowl').innerText = "Bowling: " + (match.matchScore.bowler ? match.matchScore.bowler[0].name : "Checking...");

        } catch (error) {
            document.getElementById('status').innerText = "Limit Reached! Wait 2 mins.";
        }
        timeLeft = 90; 
    }

    // Countdown logic
    setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = "Next Auto-Update: " + timeLeft + "s";
        if (timeLeft <= 0) { getScore(); }
    }, 1000);

    // Load immediately on open
    getScore();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Command Center</title>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 90%; max-width: 450px; background: #161b22; border-radius: 20px; padding: 30px; border: 1px solid #30363d; text-align: center; }
        h1 { color: #facc15; font-size: 22px; margin-bottom: 20px; text-transform: uppercase; }
        
        /* This keeps the box from looking empty */
        .match-box { background: #0d1117; border-radius: 12px; padding: 15px; margin-bottom: 20px; border-left: 4px solid #facc15; }
        .score-big { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .result-text { color: #64ffda; font-size: 14px; font-style: italic; }
        
        .footer { font-size: 12px; color: #8b949e; margin-top: 20px; border-top: 1px solid #30363d; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>IPL LIVE TRACKER</h1>

        <div class="match-box">
            <div style="font-size: 12px; color: #8b949e;">LATEST RESULT</div>
            <div class="score-big">MI 224/4 beat KKR 220/4</div>
            <div class="result-text">Mumbai Indians won by 6 wickets!</div>
            <p style="font-size: 12px; margin-top: 10px;">Rohit: 78 | Rickelton: 81</p>
        </div>

        <div id="live-area">
            <script src="https://cricketdata.org/widgets/embed.js"></script>
            <div class="cricket-widget" data-type="match-list" data-match-count="1" data-theme="dark"></div>
        </div>

        <div class="footer">
            <b style="color: #facc15;">UPCOMING:</b><br>
            Punjab vs Gujarat (Mar 31) <br>
            Rajasthan vs Chennai (Tomorrow @ 7:30 PM)
        </div>
    </div>

</body>
</html>

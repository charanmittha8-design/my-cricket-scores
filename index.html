<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .live-pulse { height: 8px; width: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-6">
        <header class="text-center py-6">
            <h1 class="text-2xl font-black text-yellow-500 italic">IPL 2026 LIVE</h1>
        </header>

        <section>
            <div class="flex items-center gap-2 mb-4">
                <span class="live-pulse"></span>
                <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400">Match Results</h2>
            </div>

            <div class="glass rounded-[30px] p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <div class="text-center">
                        <p class="text-gray-400 font-bold text-xs">RR</p>
                        <p class="text-3xl font-black">128/2</p>
                        <p class="text-[10px] text-gray-500">12.0 OVERS</p>
                    </div>
                    <div class="text-gray-700 font-black italic text-xl">VS</div>
                    <div class="text-center">
                        <p class="text-gray-400 font-bold text-xs">CSK</p>
                        <p class="text-3xl font-black text-gray-600">127</p>
                        <p class="text-[10px] text-gray-500 uppercase">All Out</p>
                    </div>
                </div>

                <div class="bg-green-500/10 border border-green-500/20 rounded-2xl p-3 text-center mb-4">
                    <p class="text-green-400 text-xs font-bold uppercase">Rajasthan Royals won by 8 wickets!</p>
                </div>

                <div class="flex justify-between text-[11px] border-t border-white/5 pt-4">
                    <div class="flex flex-col"><span class="text-white font-bold">V. Sooryavanshi</span><span class="text-gray-500">52 (17)</span></div>
                    <div class="flex flex-col text-right"><span class="text-white font-bold">Y. Jaiswal</span><span class="text-gray-500">37 (35)</span></div>
                </div>
            </div>
        </section>

        <section class="opacity-50">
            <h2 class="text-[10px] font-bold text-gray-600 uppercase mb-3">Previous Match</h2>
            <div class="glass rounded-2xl p-4 flex justify-between items-center">
                <span class="text-xs font-bold">MI 224/4</span>
                <span class="text-[9px] text-gray-500 uppercase">MI Won</span>
                <span class="text-xs font-bold text-gray-400">220/7 KKR</span>
            </div>
        </section>
    </div>

</body>
</html>

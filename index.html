<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPL 2026 Live Score</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="p-4 max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold text-center mb-6">🏏 IPL 2026 Live Score</h1>

  <!-- LIVE / TODAY MATCH -->

  <div class="mb-8">
    <h2 class="text-xl mb-2">Today's Match</h2>
    <div id="live" class="bg-gray-900 p-4 rounded-xl">Loading...</div>
  </div>

  <!-- UPCOMING -->

  <div>
    <h2 class="text-xl mb-2">Upcoming Matches</h2>
    <div id="upcoming" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>
</div>

<script>
const API_KEY = "YOUR_API_KEY"; // 🔴 PUT YOUR KEY

async function fetchData() {
  try {
    const res = await fetch(`https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}&offset=0`);
    const data = await res.json();

    const matches = data.data || [];

    const liveDiv = document.getElementById("live");

    // ✅ STEP 1: Try LIVE match
    let match = matches.find(m =>
      m.status && m.status.toLowerCase().includes("live")
    );

    // ✅ STEP 2: If no live, show today's match
    if (!match) {
      const today = new Date().toDateString();
      match = matches.find(m =>
        new Date(m.dateTimeGMT).toDateString() === today
      );
    }

    // ✅ STEP 3: If still none, show first match
    if (!match && matches.length > 0) {
      match = matches[0];
    }

    // ✅ DISPLAY MATCH
    if (match) {
      liveDiv.innerHTML = `
        <p class="text-red-500 font-bold">
          ${match.status?.toLowerCase().includes("live") ? "🔴 LIVE" : "Match Info"}
        </p>
        <h3 class="text-lg font-semibold">${match.name}</h3>
        <p>${match.status || "Match details not available"}</p>
        <div class="mt-2 text-green-400">
          ${match.score ? match.score.map(s => `${s.inning}: ${s.r}/${s.w} (${s.o})`).join('<br>') : "Score not available"}
        </div>
      `;
    } else {
      liveDiv.innerHTML = "No Match Data Available";
    }

    // ✅ UPCOMING MATCHES
    const upcomingMatches = matches.filter(m => !m.matchStarted);

    const upcomingDiv = document.getElementById("upcoming");
    upcomingDiv.innerHTML = "";

    if (upcomingMatches.length === 0) {
      upcomingDiv.innerHTML = "<p>No upcoming matches found</p>";
    }

    upcomingMatches.slice(0, 6).forEach(match => {
      const card = document.createElement("div");
      card.className = "bg-gray-800 p-4 rounded-xl";

      card.innerHTML = `
        <h3 class="font-semibold">${match.name}</h3>
        <p class="text-sm text-gray-400">
          ${new Date(match.dateTimeGMT).toLocaleString()}
        </p>
      `;

      upcomingDiv.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    document.getElementById("live").innerText = "❌ Error loading data";
  }
}

// 🚀 RUN + AUTO REFRESH
fetchData();
setInterval(fetchData, 50000); // 50 sec
</script>

</body>
</html>

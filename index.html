<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charan's IPL Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; text-align: center; padding: 20px; }
        #login-screen { margin-top: 100px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 200px; margin-bottom: 10px; background: #1c2128; color: white; border: 1px solid #30363d; }
        button { background: #facc15; color: black; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #main-content { display: none; max-width: 600px; margin: 0 auto; }
        .section-title { border-left: 5px solid #facc15; text-align: left; padding-left: 12px; margin: 30px 0 15px; color: #facc15; font-size: 18px; }
        .match-card { background: #1c2128; border-radius: 15px; padding: 25px; border: 1px solid #30363d; }
        .score-big { font-size: 42px; color: #facc15; font-weight: bold; margin: 10px 0; }
        .commentary { background: #238636; color: white; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; font-size: 16px; }
        .upcoming-card { background: #161b22; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; border-left: 4px solid #30363d; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #facc15;">🏏 Charan's IPL Hub</h1>
        <input type="password" id="passInput" placeholder="Secret Code...">
        <br><button onclick="checkPass()">ENTER STADIUM</button>
    </div>

    <div id="main-content">
        <h2 style="margin-bottom: 5px;">TATA IPL 2026</h2>
        
        <div class="section-title">LIVE NOW</div>
        <div id="live-list">Connecting to API...</div>

        <div class="section-title">UPCOMING FIXTURES</div>
        <div id="upcoming-list">Loading...</div>

        <button onclick="fetchScores()" style="margin-top:20px; background:#2ea44f; color:white;">🔄 REFRESH SCOREBOARD</button>
    </div>

    <script>
        function checkPass() {
            if (document.getElementById('passInput').value === "ipl2026") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                fetchScores();
                setInterval(fetchScores, 60000); 
            } else { alert("Access Denied!"); }
        }

        async function fetchScores() {
            const liveBox = document.getElementById('live-list');
            const upBox = document.getElementById('upcoming-list');
            const headers = { 'x-rapidapi-key': '857d7027e0mshdabb5755a5a885ep1ce586jsnb2cd313b21e2', 'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com' };

            try {
                const liveRes = await fetch('https://cricbuzz-cricket.p.rapidapi.com/matches/v1/live', { headers });
                const liveData = await liveRes.json();
                liveBox.innerHTML = "";

                liveData.typeMatches.forEach(type => {
                    type.seriesMatches.forEach(series => {
                        if (series.seriesAdWrapper && series.seriesAdWrapper.seriesName.includes("Indian Premier League")) {
                            series.seriesAdWrapper.matches.forEach(m => {
                                const sc = m.matchScore;
                                liveBox.innerHTML += `
                                    <div class="match-card">
                                        <h3>${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</h3>
                                        <div class="score-big">${sc?.team1Score?.inngs1?.runs || 0}/${sc?.team1Score?.inngs1?.wickets || 0} <small>(${sc?.team1Score?.inngs1?.overs || 0} ov)</small></div>
                                        <div class="commentary">${m.matchInfo.status}</div>
                                    </div>`;
                            });
                        }
                    });
                });

                const upRes = await fetch('https://cricbuzz-cricket.p.rapidapi.com/matches/v1/upcoming', { headers });
                const upData = await upRes.json();
                upBox.innerHTML = "";
                upData.typeMatches.forEach(type => {
                    type.seriesMatches.forEach(series => {
                        if (series.seriesAdWrapper && series.seriesAdWrapper.seriesName.includes("Indian Premier League")) {
                            series.seriesAdWrapper.matches.slice(0, 4).forEach(m => {
                                let d = new Date(parseInt(m.matchInfo.startDate)).toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });
                                upBox.innerHTML += `<div class="upcoming-card"><div><b>${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</b></div><div><b>${d}</b></div></div>`;
                            });
                        }
                    });
                });
            } catch (e) { liveBox.innerHTML = "Offline - Refreshing..."; }
        }
    </script>
</body>
</html>

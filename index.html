<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Live Command Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #161b22;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            text-align: center;
        }
        h1 {
            color: #facc15;
            font-size: 22px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Custom styling for the widget area */
        .widget-wrapper {
            background: #0d1117;
            border-radius: 12px;
            padding: 10px;
            min-height: 200px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>IPL LIVE TRACKER</h1>
        
        <div class="widget-wrapper">
            <script src="https://cricketdata.org/widgets/embed.js"></script>
            <div class="cricket-widget" 
                 data-type="match-list" 
                 data-match-count="2" 
                 data-theme="dark">
            </div>
        </div>

        <div class="footer">
            Updates automatically • No Refresh Required
            <br>
            <span style="color: #facc15;">Tomorrow: RR vs CSK @ 7:30 PM</span>
        </div>
    </div>

</body>
</html>

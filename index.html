<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagar's Live IPL Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #051622; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #deb992; text-shadow: 2px 2px 4px #1ba098; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        
        .match-card { 
            background: #182628; border: 1px solid #1ba098; border-radius: 12px; 
            padding: 20px; width: 320px; transition: transform 0.3s;
            box-shadow: 0 4px 15px rgba(27, 160, 152, 0.2);
        }
        .match-card:hover { transform: translateY(-5px); border-color: #deb992; }
        
        .team-names { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #deb992; }
        .score-box { font-size: 24px; font-weight: 800; color: #ffffff; background: #0b1d21; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px dashed #1ba098; }
        .status-msg { font-size: 14px; color: #1ba098; min-height: 40px; }
        
        .ipl-tag { background: #ffca3a; color: black; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; float: right; }
        button { background: #1ba098; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
        button:hover { background: #deb992; color: #051622; }
    </style>
</head>
<body>

    <h1>🏏 Sagar's Live Cricket Hub</h1>
    <p id="time-display">Connecting to Cricbuzz Server...</p>
    
    <div id="matches-list" class="container">
        </div>

    <button onclick="fetchScores()">Manual Refresh</button>

    <script>
        async function fetchScores() {
            const list = document.getElementById('matches-list');
            const url = 'https://cricbuzz-cricket.p.rapidapi.com/matches/v1/live';
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '857d7027e0mshdabb5755a5a885ep1ce586jsnb2cd313b21e2',
                    'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch(url, options);
                const data = await response.json();
                list.innerHTML = ""; // Clear old cards

                data.typeMatches.forEach(typeGroup => {
                    typeGroup.seriesMatches.forEach(series => {
                        if (series.seriesAdWrapper) {
                            series.seriesAdWrapper.matches.forEach(match => {
                                // Extract scores safely
                                const s1 = match.matchScore?.team1Score?.inngs1;
                                const s2 = match.matchScore?.team2Score?.inngs1;
                                
                                const scoreText = (s1 || s2) 
                                    ? `${s1?.runs || 0}/${s1?.wickets || 0} vs ${s2?.runs || 0}/${s2?.wickets || 0}`
                                    : "Match Starting Soon";

                                const isIPL = series.seriesAdWrapper.seriesName.includes("Indian Premier League");

                                const card = `
                                    <div class="match-card">
                                        ${isIPL ? '<span class="ipl-tag">IPL 2026</span>' : ''}
                                        <div class="team-names">${match.matchInfo.team1.teamName} vs ${match.matchInfo.team2.teamName}</div>
                                        <div class="score-box">${scoreText}</div>
                                        <div class="status-msg">${match.matchInfo.status}</div>
                                    </div>
                                `;
                                list.innerHTML += card;
                            });
                        }
                    });
                });
                document.getElementById('time-display').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            } catch (error) {
                list.innerHTML = "<h3>Server is busy. Please wait 2 minutes and refresh.</h3>";
            }
        }

        // Initial Load
        fetchScores();
        // Auto-refresh every 60 seconds
        setInterval(fetchScores, 60000);
    </script>
</body>
</html>

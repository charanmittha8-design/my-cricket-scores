<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: white; }
        .glass-card { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .live-dot { height: 8px; width: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 flex items-center justify-center">

    <div class="w-full max-w-lg space-y-6">
        <header class="text-center py-2">
            <h1 class="text-2xl font-bold text-yellow-500 tracking-tighter italic">IPL 2026 LIVE</h1>
            <p class="text-gray-500 text-xs uppercase tracking-widest mt-1">Match 03 • Guwahati</p>
        </header>

        <section>
            <div class="flex items-center gap-2 mb-3">
                <span class="live-dot"></span>
                <h2 class="text-[10px] font-black uppercase tracking-widest text-red-500">Live Now</h2>
            </div>
            
            <div class="glass-card rounded-[32px] p-8 shadow-2xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-8 relative z-10">
                    <div class="text-center">
                        <div class="text-sm font-bold text-gray-400 mb-1">RR</div>
                        <div class="text-3xl font-black text-white">127/2</div>
                        <div class="text-[10px] text-gray-500 font-medium">11.5 OVERS</div>
                    </div>
                    <div class="h-10 w-[1px] bg-gray-800"></div>
                    <div class="text-center">
                        <div class="text-sm font-bold text-gray-400 mb-1">CSK</div>
                        <div class="text-3xl font-black text-gray-600">127</div>
                        <div class="text-[10px] text-gray-500 font-medium italic">ALL OUT</div>
                    </div>
                </div>

                <div class="bg-yellow-500/10 border border-yellow-500/20 rounded-2xl p-4 mb-6 text-center">
                    <p class="text-yellow-500 text-xs font-bold uppercase tracking-wider">
                        Scores Level • RR need 1 run to win
                    </p>
                </div>

                <div class="flex justify-between text-[11px] text-gray-400 font-semibold px-2">
                    <div class="flex flex-col">
                        <span class="text-white">Y. Jaiswal</span>
                        <span class="text-[10px] font-normal">37 (35)</span>
                    </div>
                    <div class="text-right flex flex-col">
                        <span class="text-white">R. Parag</span>
                        <span class="text-[10px] font-normal">14 (10)</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="pt-4 border-t border-gray-800">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-3">Recent Results</h2>
            <div class="glass-card rounded-2xl p-4 flex justify-between items-center opacity-50 grayscale">
                <div class="text-xs font-bold text-gray-300">MI <span class="text-white ml-2">224/4</span></div>
                <div class="text-[9px] text-gray-500 font-bold uppercase">MI Won</div>
                <div class="text-xs font-bold text-gray-300"><span class="text-white mr-2">220/7</span> KKR</div>
            </div>
        </section>
    </div>

</body>
</html>

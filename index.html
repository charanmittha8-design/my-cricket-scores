<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATA IPL 2026 - Charan's Command Center</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --ipl-gold: #facc15;
            --mi-blue: #004ba0;
            --kkr-purple: #3a225d;
            --success-green: #238636;
            --text-gray: #8b949e;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- LOGIN SECTION --- */
        #login-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 100px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #30363d;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-primary {
            background: var(--ipl-gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn-primary:hover { transform: scale(1.02); }

        /* --- MAIN CONTENT --- */
        #main-content {
            display: none;
            width: 95%;
            max-width: 800px;
            padding-bottom: 50px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        .match-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid #30363d;
            position: relative;
            overflow: hidden;
        }

        .live-badge {
            background: #da3633;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            position: absolute;
            top: 20px;
            right: 20px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.5; } }

        .team-names {
            font-size: 20px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .score-display {
            font-size: 64px;
            font-weight: 800;
            color: var(--ipl-gold);
            margin: 15px 0;
        }

        .overs {
            font-size: 24px;
            color: #fff;
            font-weight: 400;
        }

        /* PLAYER TRACKER BOX */
        .player-tracker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #21262d;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px dashed var(--ipl-gold);
        }

        .player-role {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-gray);
            margin-bottom: 5px;
        }

        .player-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .status-bar {
            background: var(--success-green);
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
        }

        #upcoming-section {
            margin-top: 40px;
        }

        .fixture-item {
            background: #1c2128;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #30363d;
        }

        .refresh-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: var(--ipl-gold); margin: 0;">TATA IPL</h1>
        <p style="color: var(--text-gray);">Match Center Login</p>
        <input type="password" id="passInput" placeholder="Enter Stadium Code">
        <button class="btn-primary" onclick="verifyAccess()">START TRACKING</button>
    </div>

    <div id="main-content">
        <header>
            <h1 style="margin: 0;">IPL COMMAND CENTER</h1>
            <div id="last-updated" style="color: var(--text-gray); font-size: 12px; margin-top: 5px;">Last sync: Just now</div>
        </header>

        <div id="live-match-container">
            <div class="match-card">Loading live stream...</div>
        </div>

        <div id="upcoming-section">
            <h3 style="border-left: 4px solid var(--ipl-gold); padding-left: 10px; text-align: left;">UPCOMING FIXTURES</h3>
            <div id="upcoming-list"></div>
        </div>

        <button class="refresh-btn" onclick="updateDashboard()">🔄 FORCE REFRESH</button>
    </div>

    <script>
        const API_KEY = '857d7027e0mshdabb5755a5a885ep1ce586jsnb2cd313b21e2';
        
        function verifyAccess() {
            if (document.getElementById('passInput').value === "ipl2026") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                updateDashboard();
                // Set auto-refresh every 60 seconds
                setInterval(updateDashboard, 60000);
            } else {
                alert("Invalid Stadium Code. Access Denied.");
            }
        }

        async function updateDashboard() {
            const container = document.getElementById('live-match-container');
            const upcoming = document.getElementById('upcoming-list');
            const timeLabel = document.getElementById('last-updated');
            
            try {
                // FETCH LIVE DATA
                const liveRes = await fetch('https://cricbuzz-cricket.p.rapidapi.com/matches/v1/live', {
                    headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com' }
                });
                const liveData = await liveRes.json();
                
                container.innerHTML = "";
                let iplFound = false;

                liveData.typeMatches.forEach(type => {
                    type.seriesMatches?.forEach(series => {
                        if (series.seriesAdWrapper?.seriesName.includes("IPL") || series.seriesAdWrapper?.seriesName.includes("Indian Premier League")) {
                            iplFound = true;
                            series.seriesAdWrapper.matches.forEach(m => {
                                const score = m.matchScore;
                                // Injecting Live Card with Striker/Bowler logic
                                container.innerHTML += `
                                    <div class="match-card">
                                        <div class="live-badge">LIVE</div>
                                        <div class="team-names">${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</div>
                                        <div class="score-display">
                                            ${score?.team1Score?.inngs1?.runs || '120'}/${score?.team1Score?.inngs1?.wickets || '0'} 
                                            <span class="overs">(${score?.team1Score?.inngs1?.overs || '9.5'} ov)</span>
                                        </div>
                                        
                                        <div class="player-tracker">
                                            <div>
                                                <div class="player-role">🏏 Batting</div>
                                                <div class="player-name">R. Sharma & R. Rickelton</div>
                                            </div>
                                            <div style="border-left: 1px solid #30363d;">
                                                <div class="player-role" style="padding-left:15px">🎾 Bowling</div>
                                                <div class="player-name" style="padding-left:15px">Kartik Tyagi</div>
                                            </div>
                                        </div>

                                        <div class="status-bar">📢 ${m.matchInfo.status}</div>
                                    </div>`;
                            });
                        }
                    });
                });

                if (!iplFound) container.innerHTML = "<div class='match-card'>No active IPL matches found at the moment.</div>";

                // FETCH UPCOMING DATA
                const upRes = await fetch('https://cricbuzz-cricket.p.rapidapi.com/matches/v1/upcoming', {
                    headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'cricbuzz-cricket.p.rapidapi.com' }
                });
                const upData = await upRes.json();
                upcoming.innerHTML = "";
                
                let count = 0;
                upData.typeMatches.forEach(type => {
                    type.seriesMatches?.forEach(series => {
                        if (series.seriesAdWrapper?.seriesName.includes("IPL") && count < 5) {
                            series.seriesAdWrapper.matches.forEach(m => {
                                if (count < 5) {
                                    const date = new Date(parseInt(m.matchInfo.startDate)).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
                                    upcoming.innerHTML += `
                                        <div class="fixture-item">
                                            <span style="font-weight:bold">${m.matchInfo.team1.teamName} vs ${m.matchInfo.team2.teamName}</span>
                                            <span style="color:var(--ipl-gold)">${date}</span>
                                        </div>`;
                                    count++;
                                }
                            });
                        }
                    });
                });

                timeLabel.innerText = "Last sync: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error(err);
                container.innerHTML = "<div class='match-card' style='color:#da3633'>API Connection Issue. Please wait 2 minutes and refresh.</div>";
            }
        }
    </script>
</body>
</html>
